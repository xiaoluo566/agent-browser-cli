name: Publish npm

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish-binaries:
    name: Publish ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    environment: npm
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: darwin-arm64
            os: macos-14
            target: aarch64-apple-darwin
            binary: agent-browser-cli
          - name: darwin-x64
            os: macos-15-intel
            target: x86_64-apple-darwin
            binary: agent-browser-cli
          - name: linux-x64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            binary: agent-browser-cli
          - name: win32-x64
            os: windows-2022
            target: x86_64-pc-windows-msvc
            binary: agent-browser-cli.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm
        shell: bash
        run: npm install -g npm@11.5.1

      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage platform package
        run: node scripts/package-platform.mjs ${{ matrix.name }} target/${{ matrix.target }}/release/${{ matrix.binary }}

      - name: Publish platform package
        shell: bash
        working-directory: npm/platform/${{ matrix.name }}
        run: |
          set -euo pipefail
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if npm publish --access public; then
            exit 0
          fi
          if [ "$(npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version 2>/dev/null || true)" = "${PACKAGE_VERSION}" ]; then
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} already published, skip"
            exit 0
          fi
          exit 1

  publish-main:
    name: Publish main package
    runs-on: ubuntu-latest
    environment: npm
    needs: publish-binaries
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm
        run: npm install -g npm@11.5.1

      - name: Publish main package
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if npm publish --access public; then
            exit 0
          fi
          if [ "$(npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version 2>/dev/null || true)" = "${PACKAGE_VERSION}" ]; then
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} already published, skip"
            exit 0
          fi
          exit 1
