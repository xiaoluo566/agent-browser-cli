name: Publish npm

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  publish-binaries:
    name: Publish ${{ matrix.name }}
    if: ${{ !contains(github.ref_name, '-extension') }}
    runs-on: ${{ matrix.os }}
    environment: npm
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: darwin-arm64
            os: macos-14
            target: aarch64-apple-darwin
            binary: agent-browser-cli
          - name: darwin-x64
            os: macos-15-intel
            target: x86_64-apple-darwin
            binary: agent-browser-cli
          - name: linux-x64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            binary: agent-browser-cli
          - name: linux-arm64
            os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            binary: agent-browser-cli
          - name: win32-x64
            os: windows-2022
            target: x86_64-pc-windows-msvc
            binary: agent-browser-cli.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm
        shell: bash
        run: npm install -g npm@11.5.1

      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage platform package
        run: node scripts/package-platform.mjs ${{ matrix.name }} target/${{ matrix.target }}/release/${{ matrix.binary }}

      - name: Pack platform package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/npm
          npm pack "npm/platform/${{ matrix.name }}" --pack-destination dist/npm

      - name: Publish platform package
        shell: bash
        working-directory: npm/platform/${{ matrix.name }}
        run: |
          set -euo pipefail
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            NPM_TAG="${NPM_TAG:-beta}"
          else
            NPM_TAG="${NPM_TAG:-latest}"
          fi
          if npm publish --access public --tag "${NPM_TAG}"; then
            exit 0
          fi
          if [ "$(npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version 2>/dev/null || true)" = "${PACKAGE_VERSION}" ]; then
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} already published, skip"
            exit 0
          fi
          exit 1

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-browser-cli-${{ matrix.name }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}

      - name: Upload npm package artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-${{ matrix.name }}
          path: dist/npm/*.tgz

  publish-main:
    name: Publish main package
    if: ${{ !contains(github.ref_name, '-extension') }}
    runs-on: ubuntu-latest
    environment: npm
    needs: publish-binaries
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm
        run: npm install -g npm@11.5.1

      - name: Publish main package
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            NPM_TAG="${NPM_TAG:-beta}"
          else
            NPM_TAG="${NPM_TAG:-latest}"
          fi
          if npm publish --access public --tag "${NPM_TAG}"; then
            exit 0
          fi
          if [ "$(npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version 2>/dev/null || true)" = "${PACKAGE_VERSION}" ]; then
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} already published, skip"
            exit 0
          fi
          exit 1

  github-release:
    name: GitHub Release
    needs: publish-binaries
    runs-on: ubuntu-latest
    if: ${{ always() && startsWith(github.ref, 'refs/tags/') && (needs.publish-binaries.result == 'success' || needs.publish-binaries.result == 'skipped') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download binary artifacts
        if: ${{ !contains(github.ref_name, '-extension') }}
        uses: actions/download-artifact@v4
        with:
          pattern: agent-browser-cli-*
          path: dist/bin
          merge-multiple: true

      - name: Download npm package artifacts
        if: ${{ !contains(github.ref_name, '-extension') }}
        uses: actions/download-artifact@v4
        with:
          pattern: npm-*
          path: dist/npm
          merge-multiple: true

      - name: Package Chrome extension
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/extension
          cp -R assets/tmwd_cdp_bridge dist/extension/tmwd_cdp_bridge
          (cd dist/extension && zip -r ../chrome-extensions.zip tmwd_cdp_bridge)

      - name: Create release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          release_assets=()
          if [ -d dist/bin ]; then
            while IFS= read -r file; do release_assets+=("${file}"); done < <(find dist/bin -type f | sort)
          fi
          if [ -d dist/npm ]; then
            while IFS= read -r file; do release_assets+=("${file}"); done < <(find dist/npm -type f -name '*.tgz' | sort)
          fi
          extension_package="dist/chrome-extensions.zip"
          release_assets+=("${extension_package}")
          TAG_MESSAGE="$(git tag -l --format='%(contents)' "${GITHUB_REF_NAME}" | sed '/-----BEGIN PGP SIGNATURE-----/,$d' | sed '${/^$/d;}')"
          if [[ "${GITHUB_REF_NAME}" == *-extension ]]; then
            DEFAULT_NOTES="Chrome extension and skill update only. npm packages are unchanged."
          else
            DEFAULT_NOTES="Rust/npm native release for macOS, Linux, and Windows."
          fi
          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            EXISTING_NOTES="$(gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --json body --jq '.body // ""')"
            if [ -n "${TAG_MESSAGE}" ] && ! grep -Fq "${TAG_MESSAGE}" <<<"${EXISTING_NOTES}"; then
              {
                printf '%s\n' "${EXISTING_NOTES}"
                [ -n "${EXISTING_NOTES}" ] && printf '\n'
                printf '%s\n' "${TAG_MESSAGE}"
              } > release-notes.md
              gh release edit "${GITHUB_REF_NAME}" "${release_assets[@]}" \
                --repo "${GITHUB_REPOSITORY}" \
                --notes-file release-notes.md
            else
              gh release edit "${GITHUB_REF_NAME}" "${release_assets[@]}" \
                --repo "${GITHUB_REPOSITORY}"
            fi
          else
            if [ -n "${TAG_MESSAGE}" ]; then
              printf '%s\n' "${TAG_MESSAGE}" > release-notes.md
            else
              printf '%s\n' "${DEFAULT_NOTES}" > release-notes.md
            fi
            release_flags=()
            if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
              release_flags+=(--prerelease)
            fi
            gh release create "${GITHUB_REF_NAME}" "${release_assets[@]}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${GITHUB_REF_NAME}" \
              --notes-file release-notes.md \
              "${release_flags[@]}"
          fi
