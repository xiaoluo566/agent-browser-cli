name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: darwin-arm64
            os: macos-14
            target: aarch64-apple-darwin
            binary: agent-browser-cli
          - name: darwin-x64
            os: macos-15-intel
            target: x86_64-apple-darwin
            binary: agent-browser-cli
          - name: linux-x64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            binary: agent-browser-cli
          - name: win32-x64
            os: windows-2022
            target: x86_64-pc-windows-msvc
            binary: agent-browser-cli.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package platform npm package
        run: node scripts/package-platform.mjs ${{ matrix.name }} target/${{ matrix.target }}/release/${{ matrix.binary }}

      - name: Pack platform npm package
        shell: bash
        run: |
          mkdir -p dist/npm
          npm pack "npm/platform/${{ matrix.name }}" --pack-destination dist/npm

      - name: Publish platform npm package
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PACKAGE_DIR="npm/platform/${{ matrix.name }}"
          PACKAGE_NAME=$(node -p "require('./${PACKAGE_DIR}/package.json').name")
          PACKAGE_VERSION=$(node -p "require('./${PACKAGE_DIR}/package.json').version")
          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} already exists, skip publish."
          else
            if [ -n "${NODE_AUTH_TOKEN:-}" ]; then
              npm publish "${PACKAGE_DIR}" --provenance --access public
            else
              echo "NPM_TOKEN is not configured, skip npm publish."
            fi
          fi

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-browser-cli-${{ matrix.name }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}

      - name: Upload npm package artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-${{ matrix.name }}
          path: |
            npm/platform/${{ matrix.name }}
            dist/npm/*.tgz

  publish-root-npm:
    name: Publish root npm package
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Publish root npm package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} already exists, skip publish."
          else
            if [ -n "${NODE_AUTH_TOKEN:-}" ]; then
              npm publish --provenance --access public
            else
              echo "NPM_TOKEN is not configured, skip npm publish."
            fi
          fi

  github-release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: agent-browser-cli-*
          path: dist/bin
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          pattern: npm-*
          path: dist/npm
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mapfile -t npm_packages < <(find dist/npm -type f -name '*.tgz' | sort)
          TAG_MESSAGE="$(git tag -l --format='%(contents)' "${GITHUB_REF_NAME}" | sed '/-----BEGIN PGP SIGNATURE-----/,$d' | sed '${/^$/d;}')"
          DEFAULT_NOTES="Rust/npm native release for macOS, Linux, and Windows."
          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            EXISTING_NOTES="$(gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --json body --jq '.body // ""')"
            if [ -n "${TAG_MESSAGE}" ] && ! grep -Fq "${TAG_MESSAGE}" <<<"${EXISTING_NOTES}"; then
              {
                printf '%s\n' "${EXISTING_NOTES}"
                [ -n "${EXISTING_NOTES}" ] && printf '\n'
                printf '%s\n' "${TAG_MESSAGE}"
              } > release-notes.md
              gh release edit "${GITHUB_REF_NAME}" dist/bin/* "${npm_packages[@]}" \
                --repo "${GITHUB_REPOSITORY}" \
                --notes-file release-notes.md
            else
              gh release edit "${GITHUB_REF_NAME}" dist/bin/* "${npm_packages[@]}" \
                --repo "${GITHUB_REPOSITORY}"
            fi
          else
            if [ -n "${TAG_MESSAGE}" ]; then
              printf '%s\n' "${TAG_MESSAGE}" > release-notes.md
            else
              printf '%s\n' "${DEFAULT_NOTES}" > release-notes.md
            fi
            gh release create "${GITHUB_REF_NAME}" dist/bin/* "${npm_packages[@]}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${GITHUB_REF_NAME}" \
              --notes-file release-notes.md
          fi
